name: CI/CD Pipeline

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:

  # -------------------------
  # PR LINT
  # -------------------------
  lint_pr:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    container:
      image: node:20

    steps:
      - uses: actions/checkout@v4
      - run: npm ci
      - run: npm run lint:check


  # -------------------------
  # DEPLOY ON MAIN
  # -------------------------
  deploy_main:
    if: github.event_name == 'push'
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      - run: npm ci

      # 1. Initial lint check
      - name: Lint check
        id: lint_check
        run: npm run lint:check
        continue-on-error: true

      # 2. Try auto-fix
      - name: Attempt lint fix
        if: steps.lint_check.outcome == 'failure'
        run: npm run lint:fix

      # 3. Final lint validation (hard gate)
      - name: Final lint validation
        run: npm run lint:check

      # 4. Build Docker image
      - name: Build Docker image
        run: docker build -t my-app:latest .

      # 5. Stop & remove old container
      - name: Remove old container
        run: docker rm -f my-app || true

      # 6. Run new container (WEB DEPLOY)
      - name: Run container
        run: |
          docker run -d \
            --name my-app \
            -p 3000:3000 \
            --restart unless-stopped \
            my-app:latest
