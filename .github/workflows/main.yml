name: Lint On Pull

on:
  pull_request:
    branches:
      - main

jobs:
  Lint:
    runs-on: ubuntu-latest
    container:
      image: node:20
    steps:
      - uses: super-linter/super-linter@v5
        with:
          node-version: 20
      - run: npm ci
      - run: npm lint
      - run: npm build
